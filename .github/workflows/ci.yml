name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a  # v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -count=1

  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a  # v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -o fspeek ./cmd/fspeek

      - name: Version flag prints fspeek dev
        run: |
          output=$(./fspeek --version)
          echo "Got: $output"
          echo "$output" | grep -qE "^fspeek (dev|v?[0-9]+\.[0-9]+)"

      - name: No URL exits non-zero with usage
        run: |
          if ./fspeek 2>/dev/null; then
            echo "Expected non-zero exit when no --url given"
            exit 1
          fi
          ./fspeek 2>&1 | grep -q "\-\-url"
